name: Deploy Insurance AI to AWS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY_BACKEND: ${{ secrets.ECR_REPOSITORY_BACKEND }}
  ECR_REPOSITORY_FRONTEND: ${{ secrets.ECR_REPOSITORY_FRONTEND }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE_BACKEND: ${{ secrets.ECS_SERVICE_BACKEND }}
  ECS_SERVICE_FRONTEND: ${{ secrets.ECS_SERVICE_FRONTEND }}

jobs:
  build-and-deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_ECR }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ECR }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -f backend/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:latest

      - name: Update backend service
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_ECS }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ECS }}
          aws-region: ${{ env.AWS_REGION }}
      
      - run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE_BACKEND \
            --force-new-deployment
      
      - name: Wait for ECS deployment
        run: |
          echo "Waiting for backend service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.ECS_SERVICE_BACKEND }}

          echo "Additional wait for container initialization..."
          sleep 60          

  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_ECR }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ECR }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -f frontend/Dockerfile \
            --build-arg VITE_API_URL=/api \
            -t $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:latest \
            ./frontend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:latest

      - name: Update frontend service
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_ECS }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ECS }}
          aws-region: ${{ env.AWS_REGION }}
      
      - run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE_FRONTEND \
            --force-new-deployment
      
      - name: Wait for ECS deployment
        run: |
          echo "Waiting for frontend service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.ECS_SERVICE_FRONTEND }}
          
          echo "Additional wait for container initialization..."
          sleep 60

  health-check:
    needs: [build-and-deploy-backend, build-and-deploy-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 120  # Increase wait time to 2 minutes
      
      - name: Debug - Print ALB DNS
        run: |
          echo "ALB DNS: ${{ secrets.ALB_DNS }}"
          # Check if secret exists
          if [ -z "${{ secrets.ALB_DNS }}" ]; then
            echo "ALB_DNS secret is empty!"
            exit 1
          fi
      
      - name: Test DNS resolution
        run: |
          # Test if DNS resolves
          nslookup ${{ secrets.ALB_DNS }} || exit 1
      
      - name: Check backend health with retry
        run: |
          # Retry up to 10 times with 30 second intervals
          for i in {1..20}; do
            echo "Attempt $i: Checking health..."
            if curl -f -s -o /dev/null -w "%{http_code}" http://${{ secrets.ALB_DNS }}/api/health | grep -q "200"; then
              echo "Backend is healthy!"
              exit 0
            fi
            echo "Waiting 30 seconds before retry..."
            sleep 30
          done
          echo "Backend health check failed after 10 attempts"
          exit 1
      
      - name: Check frontend
        run: |
          for i in {1..20}; do
            echo "Attempt $i: Checking frontend..."
            if curl -f -s -o /dev/null -w "%{http_code}" http://${{ secrets.ALB_DNS }} | grep -q "200"; then
              echo "Frontend is healthy!"
              exit 0
            fi
            echo "Waiting 30 seconds before retry..."
            sleep 30
          done
          echo "Frontend health check failed after 10 attempts"
          exit 1
      
      - name: Success message
        run: |
          echo "Deployment successful!"
          echo "Application: http://${{ secrets.ALB_DNS }}"